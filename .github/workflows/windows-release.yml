name: Desktop Release Build

on:
  push:
    branches:
      - main
    tags:
      - "v*"
    paths-ignore:
      - "**/*.md"
      - "docs/**"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-desktop:
    name: Build ${{ matrix.label }}
    runs-on: ${{ matrix.runner }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - label: Windows
            runner: windows-latest
            artifact: CodexPanel-Windows
          - label: Linux
            runner: ubuntu-latest
            artifact: CodexPanel-Linux
          - label: macOS
            runner: macos-latest
            artifact: CodexPanel-macOS

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux desktop dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential pkg-config libgtk-3-dev libwebkit2gtk-4.1-dev

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23.x"
          cache: true

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0

      - name: Install npm dependencies
        run: npm ci

      - name: Check JavaScript
        run: |
          npm run check
          node --check windows/node-sidecar.js

      - name: Check Go
        run: go test ./...

      - name: Build Wails desktop
        run: npm run wails:build

      - name: Build Node sidecar
        run: npm run wails:sidecar

      - name: Build Windows installer
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          choco install innosetup --yes --no-progress
          $isccCandidates = @(
            "${env:LOCALAPPDATA}\Programs\Inno Setup 6\ISCC.exe",
            "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe",
            "${env:ProgramFiles}\Inno Setup 6\ISCC.exe"
          )
          $iscc = $isccCandidates | Where-Object { Test-Path -LiteralPath $_ } | Select-Object -First 1
          if (-not $iscc) {
            $iscc = (Get-Command ISCC.exe -ErrorAction Stop).Source
          }
          $version = (Get-Content package.json -Raw | ConvertFrom-Json).version
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          & $iscc "build/windows/CodexPanel.iss" "/DAppVersion=$version"

      - name: Package portable bundle
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          if ("${{ runner.os }}" -eq "Windows") {
            $archive = "dist/${{ matrix.artifact }}.zip"
            Compress-Archive -Path build/bin/* -DestinationPath $archive -Force
          } else {
            $archive = "dist/${{ matrix.artifact }}.tar.gz"
            tar -czf $archive -C build/bin .
          }
          Get-Item $archive | Format-List FullName,Length

      - name: Upload portable artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}-${{ github.sha }}
          path: dist/*
          if-no-files-found: error

  publish-release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build-desktop
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download desktop artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Prepare release metadata
        id: release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            tag="${GITHUB_REF_NAME}"
            name="CodexPanel ${GITHUB_REF_NAME}"
            notes="CodexPanel desktop release ${GITHUB_REF_NAME}."
          else
            tag="latest"
            name="CodexPanel Latest"
            notes="Latest CodexPanel desktop build from main: ${GITHUB_SHA}."
            gh release delete "$tag" --yes --cleanup-tag || true
            git tag -f "$tag" "$GITHUB_SHA"
            git push -f origin "refs/tags/$tag"
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "name=$name" >> "$GITHUB_OUTPUT"
          {
            echo "notes<<EOF"
            echo "$notes"
            echo
            echo "Commit: ${GITHUB_SHA}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
          find release-assets -maxdepth 1 -type f -print | sort

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release.outputs.tag }}
          name: ${{ steps.release.outputs.name }}
          body: ${{ steps.release.outputs.notes }}
          files: release-assets/*
          overwrite_files: true
          make_latest: true
