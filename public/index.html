  <title>CodexPanel</title>
  <script>
    (() => {
      try {
        let savedTheme = localStorage.getItem('codex.theme.v1');
        if (localStorage.getItem('codex.themeDefault.v1') !== 'light-v1') {
          savedTheme = 'light';
          localStorage.setItem('codex.theme.v1', 'light');
          localStorage.setItem('codex.themeDefault.v1', 'light-v1');
        }
        if (savedTheme !== 'dark') document.documentElement.classList.add('theme-light-preload');
      } catch {
        document.documentElement.classList.add('theme-light-preload');
      }
    })();

      letter-spacing: .06em;
      color: transparent;

      background: linear-gradient(92deg, rgba(255,255,255,.46) 0%, rgba(158,203,255,.95) 28%, var(--signature-dot-tint-a) 46%, rgba(142,240,183,.84) 64%, var(--signature-dot-tint-b) 78%, rgba(255,255,255,.48) 100%);
      background-size: 260% 100%;
      background-position: 50% 50%;
      -webkit-background-clip: text;

      text-shadow: 0 0 18px rgba(158,203,255,.22), 0 0 26px rgba(142,240,183,.16), 0 0 22px var(--signature-dot-glow);

      border-bottom: 1.6px solid currentColor;
      transform: translateY(-1px) rotate(45deg);
      opacity: .58;
      flex: 0 0 auto;
    }

    .reasoning-badge span,
    .model-badge span {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      line-height: 1;
    }

    .reasoning-badge.is-switching,
    .model-badge.is-switching {
      background: rgba(255,255,255,.06);
      opacity: .72;
    }

    .model-menu-card {
      grid-template-columns: minmax(0, 1fr);
      min-width: 178px;
      padding: 6px;
      border-radius: 12px;
      background: var(--codex-elevated);
    }

    .model-menu-item,
    .reasoning-menu-item {
      width: 100%;
      height: 34px;
      justify-content: flex-start;
      padding: 0 9px;
      border-radius: 8px;
      font-weight: 560;
    }

    .model-menu-item.is-current,
    .reasoning-menu-item.is-current {
      background: var(--codex-active);
      border-color: transparent;
      box-shadow: none;
    }

    .model-menu-item.is-current::after,
    .reasoning-menu-item.is-current::after {
      margin-left: auto;
      width: 6px;
      height: 10px;
      border: solid currentColor;
      border-width: 0 1.7px 1.7px 0;
      border-radius: 0;
      background: transparent;
      box-shadow: none;
      transform: translateY(-1px) rotate(45deg);
    }

    .process-status {
      display: inline-flex;
      width: fit-content;
      max-width: 100%;
      align-items: center;
      gap: 7px;
      min-height: 28px;
      margin-bottom: 12px;
      padding: 4px 10px;
      border: 1px solid var(--codex-border-soft);
      border-radius: 999px;
      background: rgba(255,255,255,.045);
      color: var(--codex-muted);
      font-size: 13px;
      line-height: 1.35;
    }

    .process-status-dot {
      width: 7px;
      height: 7px;
      border-radius: 999px;
      background: currentColor;
      opacity: .86;
      box-shadow: 0 0 0 4px rgba(255,255,255,.045);
      animation: processPulse 1.25s ease-in-out infinite;
      flex: 0 0 auto;
    }

    .process-status-title {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .process-status.is-editing {
      color: #d7d7d7;
    }

    .process-status.is-thinking {
      color: var(--codex-muted);
    }

    .process-status.is-tool {
      color: #c9c9c9;
    }

    .process-status.is-complete .process-status-dot {
      animation: none;
      box-shadow: none;
    }

    .process-feed.is-codex-native {
      gap: 10px;
      margin: 10px 0 18px;
      color: var(--codex-faint);
      font-size: 14px;
      line-height: 1.35;
    }

    .process-feed.is-codex-native > * + * {
      margin-top: 10px;
    }

    .process-summary-row {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
      color: var(--codex-faint);
    }

    .process-summary-row svg {
      width: 16px;
      height: 16px;
      flex: 0 0 auto;
      fill: none;
      stroke: currentColor;
      stroke-width: 1.8;
      stroke-linecap: round;
      stroke-linejoin: round;
      vector-effect: non-scaling-stroke;
    }

    .process-summary-text {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .process-summary-row.is-editing .process-summary-text {
      color: var(--codex-muted);
    }

    .process-summary-row.is-think svg {
      display: none;
    }

    .process-summary-row .process-file-name {
      color: #4da3ff;
    }

    .process-summary-row .process-added {
      color: #19a86b;
    }

    .process-summary-row .process-removed {
      color: #d64f4f;
    }

    .process-command-group {
      min-width: 0;
      color: var(--codex-faint);
    }

    .process-command-group > summary {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
      width: fit-content;
      max-width: 100%;
      cursor: pointer;
      list-style: none;
      user-select: none;
    }

    .process-command-group > summary::-webkit-details-marker {
      display: none;
    }

    .process-command-group > summary svg {
      width: 16px;
      height: 16px;
      flex: 0 0 auto;
      fill: none;
      stroke: currentColor;
      stroke-width: 1.8;
      stroke-linecap: round;
      stroke-linejoin: round;
      vector-effect: non-scaling-stroke;
    }

    .process-command-group > summary::after {
      content: "";
      width: 7px;
      height: 7px;
      margin-left: 2px;
      border-right: 1.5px solid currentColor;
      border-bottom: 1.5px solid currentColor;
      transform: rotate(-45deg);
      opacity: .72;
      transition: transform .16s ease;
      flex: 0 0 auto;
    }

    .process-command-group[open] > summary::after {
      transform: rotate(45deg) translateY(-1px);
    }

    .process-command-list {
      display: grid;
      gap: 6px;
      margin-top: 8px;
      padding-left: 24px;
    }

    .process-command-detail {
      min-width: 0;
      color: var(--codex-faint);
      white-space: pre-wrap;
      overflow-wrap: anywhere;
      font-size: 14px;
      line-height: 1.42;
    }

    .process-narrative {
      display: grid;
      gap: 8px;
      min-width: 0;
      max-width: 760px;
      color: var(--codex-muted);
      font-size: 15px;
      line-height: 1.62;
    }

    .process-thought {
      min-width: 0;
      color: var(--codex-text);
      overflow-wrap: anywhere;
    }

    .process-thought p {
      margin: 0;
    }

    .process-thought p + p,
    .process-thought ul,
    .process-thought ol,
    .process-thought pre,
    .process-thought blockquote,
    .process-thought .table-scroll {
      margin-top: 8px;
    }

    .process-thought pre {
      max-height: 220px;
      overflow: auto;
      border: 1px solid rgba(255,255,255,.08);
      border-radius: 8px;
      background: rgba(255,255,255,.035);
    }

    .process-thought code {
      font-size: .92em;
    }

    .process-thought.is-muted {
      color: var(--codex-faint);
    }

    body.theme-light .process-summary-row .process-file-name {
      color: #1f7ae0;
    }

    @keyframes processPulse {
      0%, 100% { opacity: .42; transform: scale(.86); }
      50% { opacity: 1; transform: scale(1); }
    }

    /* Match Codex desktop's compact top-right model/reasoning controls. */
    .top-actions .reasoning-badge,
    .top-actions .model-badge {
      width: auto;
      min-width: 30px;
      max-width: 74px;
      height: 36px;

      line-height: 36px;
      transform: none;
    }

    .top-actions .reasoning-badge.mode-low,
    .top-actions .reasoning-badge.mode-medium,
    .top-actions .reasoning-badge.mode-high,
    .top-actions .reasoning-badge.mode-xhigh,

    }

    .top-actions .reasoning-badge.is-switching,

      opacity: .56;
    }

    @media (max-width: 700px) {
      .top-actions .reasoning-badge,
      .top-actions .model-badge {
        min-width: 28px;
        max-width: 52px;
        padding-inline: 5px;
        font-size: 12px;
      }
    }

    .composer {
      grid-template-columns: auto minmax(0, 1fr) auto auto;
      align-items: end;
    }

    .composer-runtime-controls {
      display: inline-flex;
      align-items: center;
      justify-content: flex-end;
      gap: 2px;
      height: 36px;
      min-width: 0;
      color: var(--codex-muted);
    }

    .composer-runtime-controls .context-status {
      width: 30px;
      height: 36px;
      border-radius: 8px;
      display: inline-grid;
      place-items: center;

    .composer-runtime-controls .context-text {

    .composer-runtime-controls .context-ring {

    .composer-runtime-controls .context-ring::after {

    .composer-runtime-controls .model-badge,
    .composer-runtime-controls .reasoning-badge {

      min-width: 32px;
      max-width: 64px;
      height: 36px;
      padding: 0 5px;
      border: 0;
      border-radius: 8px;
      background: transparent;
      color: var(--codex-muted);
      box-shadow: none;
      font-size: 13px;
      font-weight: 560;

    .composer-runtime-controls .model-badge {

    .composer-runtime-controls .reasoning-badge {
      max-width: 112px;
      padding: 0 7px;
    }

    .composer-runtime-controls .model-badge::after,
    .composer-runtime-controls .reasoning-badge::after {
      display: none;
    }

    .composer-runtime-controls .reasoning-badge::after {
      content: "";
      display: block;
      width: 6px;
      height: 6px;
      margin-left: 2px;
      border-right: 1.5px solid currentColor;
      border-bottom: 1.5px solid currentColor;
      transform: translateY(-2px) rotate(45deg);
      opacity: .7;
      flex: 0 0 auto;
    }

    .composer-runtime-controls .model-badge span,
    .composer-runtime-controls .reasoning-badge span {
      line-height: 36px;
    }

    .composer-runtime-controls .model-badge:hover,
    .composer-runtime-controls .model-badge:active,
    .composer-runtime-controls .reasoning-badge:hover,
    .composer-runtime-controls .reasoning-badge:active,
    .composer-runtime-controls .context-status:hover,
    .composer-runtime-controls .context-status:active {
      background: var(--codex-hover);
      color: var(--codex-text);
    }

    .composer-runtime-controls::after {
      content: "";
      display: none;
      pointer-events: none;
    }

    .composer-submit-slot {
      display: inline-grid;
      place-items: center;
      width: 36px;
      height: 36px;
    }

    .composer-submit-slot .send-btn {
      grid-area: 1 / 1;
    }

    .model-menu-heading {
      padding: 5px 9px 4px;
      color: var(--codex-faint);
      font-size: 13px;
      line-height: 1.2;
    }

    .model-menu-separator {
      height: 1px;
      margin: 4px 8px;
      background: var(--codex-border-soft);
    }

    .model-menu-item.has-chevron::after {
      content: "";
      width: 7px;
      height: 7px;
      margin-left: auto;
      border-right: 1.5px solid currentColor;
      border-bottom: 1.5px solid currentColor;
      transform: rotate(-45deg);
      opacity: .55;
      background: transparent;
      box-shadow: none;
    }

    @media (max-width: 700px) {
      .composer {
        gap: 5px;
        grid-template-columns: auto minmax(0, 1fr) auto auto;
      }

      .composer-runtime-controls {
        gap: 0;
      }

      .composer-runtime-controls .context-status {
        width: 24px;
      }

      .composer-runtime-controls .model-badge,
      .composer-runtime-controls .reasoning-badge {
        max-width: 44px;
        padding-inline: 3px;
        font-size: 12px;
      }

      .composer-runtime-controls .reasoning-badge {
        max-width: 86px;
      }
    }

    @media (max-width: 700px) {
      :root {
        --topbar-content-lift: 0px;
      }

      .topbar {
        align-items: center;
      }

      .topbar > .title,
      .topbar > .top-actions {

      }

      .title {

      .sidebar-toggle,

        height: 36px;

        height: 18px;

      }

      .thread-button {
        height: 36px;
        min-height: 36px;
        align-items: center;
        padding-top: 0;
        padding-bottom: 0;
      }

        display: block;
        line-height: 36px;
      }

    html.theme-light-preload body .message.user .bubble,

    html.theme-light-preload body .thread-option-spinner,
    body.theme-light .thread-option-spinner {
      border-color: rgba(0,0,0,.14);
      border-top-color: #5f6368;
      box-shadow: none;
    }

    html.theme-light-preload body .project-activity-spinner,
    body.theme-light .project-activity-spinner {

      border-top-color: #5f6368;

      box-shadow: 0 0 0 2px #f7f7f7;
    }

    html.theme-light-preload body .thread-option[aria-current="true"] .thread-option-spinner,
    body.theme-light .thread-option[aria-current="true"] .thread-option-spinner {

    }

    html.theme-light-preload body .markdown-body code,
    body.theme-light .markdown-body code {

      background: #f4f4f5;

    }

      box-shadow: inset 0 1px 0 rgba(255,255,255,.72);

    body.theme-light .markdown-body pre code {
      border: 0;
      background: transparent;
      box-shadow: none;
    }

    html.theme-light-preload body .markdown-body blockquote,
    body.theme-light .markdown-body blockquote {

    html.theme-light-preload body .queued-send-bar,
    html.theme-light-preload body .notice-pill,
    html.theme-light-preload body .thread-action-card,

    /* Latest Codex-style composer: text area above, compact tools below. */

      grid-template-columns: auto minmax(0, 1fr) auto auto;
      grid-template-rows: minmax(30px, auto) 36px;
      align-items: end;
      column-gap: 5px;

<body>

    function applyViewportSize() {
      const viewport = window.visualViewport;
      const viewportHeight = Math.round((viewport && viewport.height) || window.innerHeight || document.documentElement.clientHeight || 0);
      const baselineHeight = Math.round(Math.max(window.innerHeight || 0, document.documentElement.clientHeight || 0, viewportHeight || 0));
      const focused = document.activeElement === textarea;
      if (!focused && !document.body.classList.contains('keyboard-open')) {
        maxViewportHeight = baselineHeight;
      } else if (!document.body.classList.contains('keyboard-open')) {
        maxViewportHeight = Math.max(maxViewportHeight, baselineHeight);
      }
      const viewportShrink = viewport ? Math.max(0, maxViewportHeight - viewportHeight) : 0;
      const focusAge = focused && keyboardFocusStartedAt ? performance.now() - keyboardFocusStartedAt : Infinity;
      const previousShift = currentKeyboardShift();
      const keyboardOpen = focused && (viewportShrink > 80 || previousShift > 0 || keyboardShiftTarget > 0 || focusAge < 900);
      document.body.classList.toggle('keyboard-open', keyboardOpen);
      document.documentElement.style.setProperty('--app-top', '0px');
      document.documentElement.style.setProperty('--app-height', `${Math.max(maxViewportHeight, viewportHeight)}px`);
      if (!keyboardOpen || !viewportHeight) {
        keyboardShiftTarget = 0;
        document.documentElement.style.setProperty('--keyboard-shift', '0px');
        keepLayoutViewportPinned();
        return false;
      }

      if (viewportShrink <= 80) {
        document.documentElement.style.setProperty('--keyboard-shift', `${Math.round(keyboardShiftTarget || previousShift || 0)}px`);
        keepLayoutViewportPinned();
        return true;
      }

      const composerBottomWithoutShift = composer.getBoundingClientRect().bottom + previousShift;
      const desiredGapRaw = Number.parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--keyboard-composer-gap'));
      const desiredGap = Number.isFinite(desiredGapRaw) ? desiredGapRaw : 0;
      const maxReasonableShift = Math.max(180, maxViewportHeight * 0.46);
      const maxShift = Math.max(0, Math.min(viewportShrink + 24, maxReasonableShift));
      const measuredShift = clampNumber(composerBottomWithoutShift - viewportHeight + desiredGap, 0, maxShift);
      const shiftTrimRaw = Number.parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--keyboard-shift-trim'));

      keyboardShiftTarget = Math.round(nextShift);
      document.documentElement.style.setProperty('--keyboard-shift', `${keyboardShiftTarget}px`);
      keepLayoutViewportPinned();
      return true;
    }

    function readCompletedThreadIds() {
      try {
        const raw = JSON.parse(localStorage.getItem(THREAD_NOTICE_STORAGE_KEY) || '[]');
        const rows = Array.isArray(raw)
          ? raw.map(id => ({ id, at: 0 }))
          : Array.isArray(raw?.rows)
            ? raw.rows
            : Array.isArray(raw?.ids)
              ? raw.ids.map(id => ({ id, at: raw.at || 0 }))
              : [];
        const ids = new Set();
        completedThreadNoticeTimes = new Map();
        for (const row of rows) {
          const id = typeof row === 'string' ? row : row?.id;
          if (!id) continue;
          const rawAt = typeof row === 'string' ? 0 : row.at;
          const at = typeof rawAt === 'number' ? rawAt : Date.parse(rawAt || '') || 0;
          ids.add(id);
          completedThreadNoticeTimes.set(id, at);
        }
        return ids;
      } catch {
        completedThreadNoticeTimes = new Map();
        return new Set();
      }
    }

    function persistCompletedThreadIds() {
      const rows = [...completedThreadIds].map(id => ({
        id,
        at: completedThreadNoticeTimes.get(id) || Date.now(),
      }));
      localStorage.setItem(THREAD_NOTICE_STORAGE_KEY, JSON.stringify({ version: 2, rows }));
    }

    function isCompletedThreadNoticeExpired(id, now = Date.now()) {
      const at = Number(completedThreadNoticeTimes.get(id)) || 0;
      return !at || now - at > THREAD_NOTICE_MAX_AGE_MS;
    }

    function hasUnreadCompletedThread() {
      const knownThreadIds = new Set(knownThreads.map(item => item.id).filter(Boolean));
      const now = Date.now();
      for (const id of completedThreadIds) {
        if (!id || id === selectedThreadId) continue;
        if (isCompletedThreadNoticeExpired(id, now)) continue;
        if (knownThreadIds.size && !knownThreadIds.has(id)) continue;
        return true;
      }
      return false;
    }

    function pruneCompletedThreadNotices() {
      const knownThreadIds = new Set(knownThreads.map(item => item.id).filter(Boolean));
      const now = Date.now();
      let changed = false;
      for (const id of [...completedThreadIds]) {
        const runtime = threadRuntimeStates.get(id);
        if (id === selectedThreadId || isCompletedThreadNoticeExpired(id, now) || (knownThreadIds.size && !knownThreadIds.has(id)) || isThreadRunningStatus(runtime?.status)) {
          completedThreadIds.delete(id);
          completedThreadNoticeTimes.delete(id);
          changed = true;
        }
      }
      if (changed) persistCompletedThreadIds();
      updateTitleDotState();
    }

    function hasOtherRunningThread() {
      for (const [id, runtime] of threadRuntimeStates) {
        if (id && id !== selectedThreadId && isThreadRunningStatus(runtime?.status)) return true;
      }
      for (const item of knownThreads) {
        if (!item?.id || item.id === selectedThreadId) continue;
        const runtime = threadRuntimeStates.get(item.id) || runtimeSnapshotFromThread(item) || {};
        if (isThreadRunningStatus(runtime.status)) return true;
      }
      return false;
    }

    function isSelectedThreadRunning() {
      const runtime = selectedThreadId ? threadRuntimeStates.get(selectedThreadId) : null;
      return Boolean(activeAssistant || pollTimer || isThreadRunningStatus(runtime?.status));
    }

    function updateTitleDotState() {
      const currentWorking = Boolean(foregroundDotBusy || isSelectedThreadRunning());
      const otherRunning = hasOtherRunningThread();
      const anyWorking = currentWorking || otherRunning;
      const unreadComplete = hasUnreadCompletedThread();
      document.body.classList.remove('dot-working', 'dot-background-working', 'dot-attention');
      document.body.classList.toggle('dot-flashing', anyWorking);
      document.body.classList.toggle('dot-blue', unreadComplete);
      document.body.classList.toggle('dot-orange', !unreadComplete && otherRunning);
    }

    function isThreadRunningStatus(status) {
      return status === 'running' || status === 'waiting';
    }

    function isThreadCompleteStatus(status) {
      return status === 'complete' || status === 'error';
    }

    function clearLocalStopSuppression(threadId) {
      if (!threadId) return;
      locallyStoppedThreads.delete(threadId);
    }

    function markThreadLocallyStopped(threadId) {
      if (!threadId) return;
      const now = Date.now();
      locallyStoppedThreads.set(threadId, {
        at: now,
        until: now + LOCAL_STOP_SUPPRESS_MS,
      });
    }

    function isLocalStopSuppressed(threadId, startedAt = '') {
      if (!threadId) return false;
      const entry = locallyStoppedThreads.get(threadId);
      if (!entry) return false;
      if (Date.now() > entry.until) {
        locallyStoppedThreads.delete(threadId);
        return false;
      }
      const startedMs = Date.parse(startedAt || '');
      if (Number.isFinite(startedMs) && startedMs > entry.at + 1000) {
        locallyStoppedThreads.delete(threadId);
        return false;
      }
      return true;
    }

    function suppressRunningSnapshotAfterLocalStop(threadId, snapshot) {
      if (!snapshot || !isThreadRunningStatus(snapshot.status) || !isLocalStopSuppressed(threadId, snapshot.startedAt)) return snapshot;
      return {
        ...snapshot,
        status: 'idle',
        active: false,
        updatedAt: new Date().toISOString(),
      };
    }

    function setThreadCompleteNotice(threadId, active, completedAtMs = Date.now()) {
      if (!threadId) return;
      const before = completedThreadIds.has(threadId);
      const beforeAt = completedThreadNoticeTimes.get(threadId) || 0;
      if (active && threadId !== selectedThreadId) {
        completedThreadIds.add(threadId);
        completedThreadNoticeTimes.set(threadId, completedAtMs || Date.now());
      } else {
        completedThreadIds.delete(threadId);
        completedThreadNoticeTimes.delete(threadId);
      }
      if (before !== completedThreadIds.has(threadId) || beforeAt !== (completedThreadNoticeTimes.get(threadId) || 0)) persistCompletedThreadIds();
      updateTitleDotState();
    }

    function runtimeSnapshotFromThread(item) {
      if (!item) return null;
      const status = item.runtimeStatus || '';
      if (!status) return null;
      return {
        status,
        active: Boolean(item.runtimeActive || isThreadRunningStatus(status)),
        startedAt: item.runtimeStartedAt || '',
        completedAt: item.runtimeCompletedAt || '',
        updatedAt: item.runtimeUpdatedAt || item.effectiveUpdatedAt || item.updatedAt || '',
        turnId: item.runtimeTurnId || '',
      };
    }

    function applyThreadRuntimeState(threadId, snapshot, options = {}) {
      if (!threadId || !snapshot) return;
      snapshot = suppressRunningSnapshotAfterLocalStop(threadId, snapshot);
      const previous = threadRuntimeStates.get(threadId);
      threadRuntimeStates.set(threadId, snapshot);
      if (threadId === selectedThreadId) {
        setThreadCompleteNotice(threadId, false);
        return;
      }
      if (isThreadRunningStatus(snapshot.status)) {
        setThreadCompleteNotice(threadId, false);
        return;
      }
      if (!options.detectTransitions || !isThreadCompleteStatus(snapshot.status) || !previous) return;
      const wasRunning = isThreadRunningStatus(previous.status);
      const changedToComplete = previous.status !== snapshot.status && isThreadCompleteStatus(snapshot.status);
      const previousTime = Date.parse(previous.completedAt || previous.updatedAt || '') || 0;
      const currentTime = Date.parse(snapshot.completedAt || snapshot.updatedAt || '') || 0;
      const isRecentCompletion = Boolean(currentTime && Date.now() - currentTime <= THREAD_NOTICE_MAX_AGE_MS);
      if (isRecentCompletion && (wasRunning || changedToComplete || (currentTime && previousTime && currentTime > previousTime))) {
        setThreadCompleteNotice(threadId, true, currentTime);
      }
    }

    function formatDuration(ms = 0) {
      const total = Math.max(0, Math.floor(Math.max(0, Number(ms) || 0) / 1000));
      const minutes = Math.floor(total / 60);
      const seconds = total % 60;
      return minutes ? `${minutes}m ${seconds}s` : `${seconds}s`;

    function setMetaLabel(meta, label = '') {
      if (!meta) return;
      const text = String(label || '');
      const match = text.match(/^(.*?)(\d+m\s+\d+s|\d+s)$/);
      meta.textContent = '';
      if (!match) {
        meta.textContent = text;
        return;
      }
      meta.append(document.createTextNode(match[1] || ''));
      const duration = match[2] || '';
      let cursor = 0;
      for (const digitMatch of duration.matchAll(/\d+/g)) {
        const index = digitMatch.index || 0;
        if (index > cursor) meta.append(document.createTextNode(duration.slice(cursor, index)));
        const number = document.createElement('span');
        number.className = 'meta-duration-number';
        number.textContent = digitMatch[0];
        meta.append(number);
        cursor = index + digitMatch[0].length;
      }
      if (cursor < duration.length) meta.append(document.createTextNode(duration.slice(cursor)));

      const parsed = Date.parse(value || '');

    function setActiveRunStart(startedAt = '', fallbackMs = Date.now()) {
      if (!activeAssistant || activeAssistant.runStartedAtMs) return;

    function activeRunDurationMs(endAt = '') {
      if (!activeAssistant) return 0;
      const startMs = Number(activeAssistant.runStartedAtMs) || parseTimeMs(activeAssistant.runStartedAt);
      if (!startMs) return 0;
      const endMs = parseTimeMs(endAt) || Date.now();
      return Math.max(0, endMs - startMs);
    }

    function finalRunDurationMs(data = {}) {
      const serverDuration = Number(data.durationMs);
      if (Number.isFinite(serverDuration) && serverDuration >= 0) return serverDuration;
      const timestampDuration = activeRunDurationMs(data.completedAt || data.updatedAt || '');
      if (timestampDuration) return timestampDuration;
      return activeRunDurationMs();

    function compactProcessPath(value = '') {

    function friendlyToolStatus(text = '') {
      const raw = compactProcessPath(text);
      if (!raw) return '正在运行工具';
      if (/^(正在|已)/.test(raw)) return raw;
      if (raw.startsWith('Read ')) return `正在读取 ${raw.slice(5)}`;
      if (raw.startsWith('Search ')) return `正在搜索 ${raw.slice(7)}`;
      if (raw.startsWith('Find files')) return '正在查找文件';
      if (raw.startsWith('List files')) return '正在查看文件列表';

      if (raw.startsWith('Run checks')) return '正在运行检查';
      if (raw.startsWith('Run git')) return '正在运行 Git';
      if (raw.startsWith('Run script')) return '正在运行脚本';
      if (raw.startsWith('Check endpoint')) return '正在检查接口';
      if (raw.startsWith('Start local service')) return '正在启动本地服务';
      if (raw.startsWith('Control Codex desktop')) return '正在控制 Codex 桌面端';
      if (raw.startsWith('Inspect Codex session log')) return '正在读取 Codex 会话记录';
      if (raw.startsWith('View image')) return '正在查看图片';
      if (raw.startsWith('Read resource')) return '正在读取资源';

    function processStatusFromSteps(steps = []) {
      if (!steps.length) return { kind: 'thinking', title: '正在思考' };
      for (let index = steps.length - 1; index >= 0; index -= 1) {
        const step = steps[index] || {};
        const text = String(step.text || '').trim();
        if (step.kind === 'tool') {
          const title = friendlyToolStatus(text);
          return {
            kind: /^正在编辑|^已编辑/.test(title) ? 'editing' : 'tool',
            title,
          };
        }
        if (step.kind === 'thinking') return { kind: 'thinking', title: '正在思考' };
        if (step.kind === 'error') return { kind: 'error', title: '处理失败' };
        if (step.kind === 'complete') return { kind: 'complete', title: '已完成' };
      }
      return { kind: 'thinking', title: '正在思考' };
    }

    function appendProcessStatus(feed, steps = []) {
      const status = processStatusFromSteps(steps);
      const row = document.createElement('div');
      const dot = document.createElement('span');
      const title = document.createElement('span');
      row.className = `process-status is-${status.kind}`;
      dot.className = 'process-status-dot';
      title.className = 'process-status-title';
      title.textContent = status.title;
      row.append(dot, title);
      feed.appendChild(row);
      if (activeAssistant) activeAssistant.statusBase = status.title;
    }

    function stepMarkdown(steps = []) {

        if (step.kind === 'error') return `- **失败**：${step.text || 'Codex 回复失败'}`;

    function renderProcessSteps(el, steps = []) {
      if (!steps.length) return setMarkdown(el, '已发送，等待 Codex 开始回复…');
      el.innerHTML = '';
      const feed = document.createElement('div');
      feed.className = 'process-feed is-codex-native';
      let rendered = false;
      let pendingCommands = [];
      const flushCommands = () => {
        if (!pendingCommands.length) return false;
        const didRender = appendProcessCommandGroup(feed, pendingCommands);
        pendingCommands = [];
        return didRender;
      };

      for (const step of steps) {
        if (!step) continue;
        if (step.kind === 'thinking') {
          rendered = flushCommands() || rendered;
          rendered = appendProcessThought(feed, processThoughtText(step)) || rendered;
          continue;
        }
        if (step.kind === 'tool') {
          const title = friendlyToolStatus(step.text || '');
          if (/^正在编辑|^已编辑/.test(title)) {
            rendered = flushCommands() || rendered;
            const summary = editSummaryHtml(step.text || '');
            appendProcessSummaryRow(feed, 'edit', summary.html, summary.text);
            rendered = true;
          } else {
            pendingCommands.push({ summary: title, detail: step.text || title });
          }
          continue;
        }
        if (step.kind === 'error') {
          rendered = flushCommands() || rendered;
          appendProcessSummaryRow(feed, 'error', escapeHtml(step.text || '处理失败'), step.text || '处理失败');
          rendered = true;
        }
      }

      rendered = flushCommands() || rendered;
      if (!rendered) appendProcessSummaryRow(feed, 'think', '正在思考', '正在思考');

    function renderQueuedSends() {

    function addQueuedSend(text, attachments = [], state = 'sending', options = {}) {
      const id = `queued-${Date.now()}-${Math.random().toString(36).slice(2)}`;

    function promoteNextQueuedSendAfterCurrent(data = {}) {
      if (!queuedSends.length) return false;
